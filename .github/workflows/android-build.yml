name: Auto-Detect Android Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK and AAB
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java / JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Auto-Find and Build Android App
      run: |
        # البحث عن ملف البناء الأساسي تلقائياً
        GRADLE_PATH=$(find . -name "gradlew" -type f | head -n 1)
        if [ -z "$GRADLE_PATH" ]; then
          echo "Error: gradlew file not found!"
          echo "الخطأ: لم يتم العثور على ملف gradlew. تأكد من أنك قمت برفع ملفات مشروع الأندرويد كاملة إلى Github."
          exit 1
        fi
        
        # الدخول إلى المجلد الصحيح وبناء التطبيق
        PROJECT_DIR=$(dirname "$GRADLE_PATH")
        echo "Found Android project at: $PROJECT_DIR"
        cd "$PROJECT_DIR"
        
        chmod +x ./gradlew
        ./gradlew assembleDebug --stacktrace
        ./gradlew bundleRelease --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: AJR-Maps-Debug-APK
        path: '**/app/build/outputs/apk/debug/*.apk'
        retention-days: 7

    - name: Upload Release AAB
      uses: actions/upload-artifact@v4
      with:
        name: AJR-Maps-Release-AAB
        path: '**/app/build/outputs/bundle/release/*.aab'
        retention-days: 7
